name: Weekly ScamFactor Rescore

on:
  schedule:
    - cron: "15 10 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-scamfactor-rescore
  cancel-in-progress: false

jobs:
  rescore:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install generator dependency
        run: python -m pip install -r requirements.txt
      - name: Rescore, rerank, and rebuild
        run: |
          python rescore_sites.py --check-live
          python scraper_simple.py
      - name: Commit refreshed tracker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html winners.html sitemap.xml reviews sponsorships.html site-types.html
          git commit -m "Weekly ScamFactor rescore: $(date -u +'%Y-%m-%d')" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
