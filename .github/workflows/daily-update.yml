name: Daily Sweepstakes Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml jinja2

      - name: Run scraper
        run: python scraper_simple.py

      - name: Force timestamp update (so it always commits)
        run: |
          echo "Last updated: $(date -u)" >> data.json
          echo "<!-- Last updated: $(date -u) -->" >> index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add index.html data.json
          git commit -m "Daily update: $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push || echo "Push failed - check permissions"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}